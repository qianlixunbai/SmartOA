spring.application.name=smartoa

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartoa?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# JWT
jwt.secret=SmartOA-Base64EncodedSecretKey-MustBeAtLeast256Bits-LongEnoughForHS256Algo
jwt.expiration=86400000
