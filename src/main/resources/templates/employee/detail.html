<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请假详情 - SmartOA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">SmartOA</span>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/employee/dashboard">返回首页</a>
            <a class="nav-link text-white" href="/api/logout">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white"><h5 class="mb-0">请假单详情</h5></div>
                <div class="card-body">
                    <table class="table table-bordered">
                        <tr><th width="120">申请人</th><td th:text="${request.applicant.realName}"></td></tr>
                        <tr><th>部门</th><td th:text="${request.applicant.department}"></td></tr>
                        <tr><th>请假类型</th><td th:text="${request.leaveType}"></td></tr>
                        <tr><th>开始日期</th><td th:text="${request.startDate}"></td></tr>
                        <tr><th>结束日期</th><td th:text="${request.endDate}"></td></tr>
                        <tr><th>请假原因</th><td th:text="${request.reason}"></td></tr>
                        <tr><th>状态</th>
                            <td>
                                <span class="badge" th:classappend="${request.status == 'PENDING'} ? 'bg-warning' : (${request.status == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                                      th:text="${request.status == 'PENDING' ? '审批中' : (request.status == 'APPROVED' ? '已通过' : '已驳回')}"></span>
                            </td>
                        </tr>
                        <tr><th>提交时间</th><td th:text="${#temporals.format(request.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
                    </table>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0">审批记录</h5></div>
                <div class="card-body">
                    <table class="table table-hover" th:if="${not #lists.isEmpty(records)}">
                        <thead>
                            <tr><th>审批人</th><th>操作</th><th>意见</th><th>时间</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${records}">
                                <td th:text="${r.approver.realName}"></td>
                                <td>
                                    <span class="badge" th:classappend="${r.action == 'APPROVE'} ? 'bg-success' : 'bg-danger'"
                                          th:text="${r.action == 'APPROVE' ? '通过' : '驳回'}"></span>
                                </td>
                                <td th:text="${r.comment}"></td>
                                <td th:text="${#temporals.format(r.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(records)}" class="text-muted text-center py-3">
                        暂无审批记录
                    </div>
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="/employee/dashboard" class="btn btn-secondary">返回</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
