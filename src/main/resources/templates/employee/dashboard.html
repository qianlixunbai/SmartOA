<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工首页 - SmartOA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">SmartOA</span>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-white" th:text="'欢迎，' + ${user.realName} + '(' + ${user.department} + ')'"></span>
            <a class="nav-link text-white" href="/api/logout">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0">提交请假申请</h5></div>
                <div class="card-body">
                    <div id="msgBox" class="alert d-none"></div>
                    <div class="mb-3">
                        <label class="form-label">请假类型</label>
                        <select id="leaveType" class="form-select">
                            <option value="年假">年假</option>
                            <option value="事假">事假</option>
                            <option value="病假">病假</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">开始日期</label>
                        <input type="date" id="startDate" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">结束日期</label>
                        <input type="date" id="endDate" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">请假原因</label>
                        <textarea id="reason" class="form-control" rows="3" placeholder="请填写请假原因"></textarea>
                    </div>
                    <button class="btn btn-primary w-100" onclick="submitLeave()">提交申请</button>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white"><h5 class="mb-0">我的请假记录</h5></div>
                <div class="card-body">
                    <table class="table table-hover" th:if="${not #lists.isEmpty(requests)}">
                        <thead>
                            <tr>
                                <th>类型</th>
                                <th>日期</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${requests}">
                                <td th:text="${r.leaveType}"></td>
                                <td th:text="${r.startDate} + ' ~ ' + ${r.endDate}"></td>
                                <td>
                                    <span class="badge" th:classappend="${r.status == 'PENDING'} ? 'bg-warning' : (${r.status == 'APPROVED'} ? 'bg-success' : 'bg-danger')"
                                          th:text="${r.status == 'PENDING' ? '审批中' : (r.status == 'APPROVED' ? '已通过' : '已驳回')}"></span>
                                </td>
                                <td>
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{/employee/detail/{id}(id=${r.id})}">详情</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    <div th:if="${#lists.isEmpty(requests)}" class="text-muted text-center py-3">
                        暂无请假记录
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function submitLeave() {
    const leaveType = document.getElementById('leaveType').value;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const reason = document.getElementById('reason').value;
    if (!startDate || !endDate) {
        showMsg('请选择日期', 'danger');
        return;
    }
    if (endDate < startDate) {
        showMsg('结束日期不能早于开始日期', 'danger');
        return;
    }
    const resp = await fetch('/api/leave/submit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({leaveType, startDate, endDate, reason})
    });
    const data = await resp.json();
    if (data.success) {
        showMsg('提交成功', 'success');
        setTimeout(() => location.reload(), 1000);
    } else {
        showMsg(data.message, 'danger');
    }
}

function showMsg(msg, type) {
    const box = document.getElementById('msgBox');
    box.textContent = msg;
    box.className = 'alert alert-' + type;
    box.classList.remove('d-none');
}
</script>
</body>
</html>
