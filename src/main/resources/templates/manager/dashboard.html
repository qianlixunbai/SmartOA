<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经理首页 - SmartOA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">SmartOA - 管理端</span>
        <div class="navbar-nav ms-auto">
            <span class="nav-link text-white" th:text="'欢迎，' + ${user.realName}"></span>
            <a class="nav-link text-white" href="/api/logout">退出</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">待审批请假单</h5>
            <span class="badge bg-warning" th:text="'共 ' + ${#lists.size(requests)} + ' 条待审批'"></span>
        </div>
        <div class="card-body">
            <table class="table table-hover" th:if="${not #lists.isEmpty(requests)}">
                <thead>
                    <tr>
                        <th>申请人</th>
                        <th>部门</th>
                        <th>请假类型</th>
                        <th>日期</th>
                        <th>原因</th>
                        <th>提交时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${requests}">
                        <td th:text="${r.applicant.realName}"></td>
                        <td th:text="${r.applicant.department}"></td>
                        <td th:text="${r.leaveType}"></td>
                        <td th:text="${r.startDate} + '~' + ${r.endDate}"></td>
                        <td>
                            <span th:text="${#strings.length(r.reason) > 15 ? #strings.substring(r.reason, 0, 15) + '...' : r.reason}"
                                  th:title="${r.reason}"></span>
                        </td>
                        <td th:text="${#temporals.format(r.createTime, 'MM-dd HH:mm')}"></td>
                        <td>
                            <a class="btn btn-sm btn-primary" th:href="@{/manager/approve/{id}(id=${r.id})}">审批</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(requests)}" class="text-muted text-center py-5">
                <h5>暂无待审批的请假单</h5>
            </div>
        </div>
    </div>
</div>
</body>
</html>
