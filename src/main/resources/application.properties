spring.application.name=smartoa

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartoa?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=admin
spring.datasource.password=123456

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-null-for-primitives=false

# SQL init (seed data 手动在 Workbench 执行)
spring.sql.init.mode=never

# JWT
jwt.secret=SmartOA-Base64EncodedSecretKey-MustBeAtLeast256Bits-LongEnoughForHS256Algo
jwt.expiration=86400000
